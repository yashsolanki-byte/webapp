# NPF web app + Redis + RQ workers (Playwright manual scrape).
#
# Prereq: copy .env.example → .env next to this file (secrets, NPF passwords).
# Redis in this stack has NO password (private Docker network only).
#
# Usage:
#   docker compose build
#   docker compose up -d
#   docker compose up -d --scale rq-worker=3   # optional: more parallel scrapes
#
# App: http://SERVER_IP:8000  (put Nginx + TLS on the host in front for production)
#
# Data persists on the host via bind mounts below.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Always use compose Redis (overrides REDIS_URL in .env if present)
      REDIS_URL: redis://redis:6379/0
      MANUAL_SCRAPE_HEADLESS: "1"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./DATA_Scraped:/app/DATA_Scraped
      - ./logs:/app/logs
      - ./Feedback_Uploader_Ready_Output:/app/Feedback_Uploader_Ready_Output

  rq-worker:
    build: .
    restart: unless-stopped
    command: python -m scrapers.manual_rq_worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MANUAL_SCRAPE_HEADLESS: "1"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./DATA_Scraped:/app/DATA_Scraped
      - ./logs:/app/logs
      - ./Feedback_Uploader_Ready_Output:/app/Feedback_Uploader_Ready_Output

volumes:
  redis-data:
